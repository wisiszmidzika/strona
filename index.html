<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Przekierowanie</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg,#1a1a1a,#111);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #e0e0e0;
      text-shadow: 0 0 10px #6a00d4;
    }
    #status {
      font-size: 1.8em;
      padding: 20px 30px;
      border-radius: 12px;
      background: #222;
      box-shadow: 0 0 20px rgba(106,0,212,0.5);
      text-align: center;
    }
  </style>
</head>
<body>
  <script>
    // automatyczne przekierowanie po 1 sekundzie
    setTimeout(() => {
      window.location.href = "przekierowanie.html";
    }, 1000);
  </script>
</body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</html>
